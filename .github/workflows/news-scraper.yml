# Rizz Jobs — Finance & Business News Scraper
# Runs twice daily — 6:30 AM IST (1:00 UTC) and 6:30 PM IST (13:00 UTC)
name: News Scraper

on:
  schedule:
    - cron: '0 1 * * *'    # 6:30 AM IST — morning edition
    - cron: '0 13 * * *'   # 6:30 PM IST — evening edition
  workflow_dispatch:
    inputs:
      limit:
        description: 'Max articles to enrich per run'
        required: false
        default: '15'
        type: string

jobs:
  scrape-news:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r scraper/requirements.txt

      - name: Run news scraper
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          NEWSAPI_KEY: ${{ secrets.NEWSAPI_KEY }}
        run: |
          cd scraper
          python news_scraper.py --limit ${{ github.event.inputs.limit || '15' }}
