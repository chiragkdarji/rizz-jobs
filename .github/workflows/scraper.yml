# AI-powered Automated Government Exam Scraper
name: Rizz Jobs Autonomous Scraper

on:
  schedule:
    # Runs at 6 AM and 6 PM UTC
    - cron: '0 6 * * *'
    - cron: '0 18 * * *'
  workflow_dispatch:
    inputs:
      mode:
        description: 'Run mode: scrape (default) or refill'
        required: false
        default: 'scrape'
        type: choice
        options:
          - scrape
          - refill
      refill_limit:
        description: 'Number of notifications to refill (refill mode only)'
        required: false
        default: '30'
        type: string

jobs:
  scrape:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r scraper/requirements.txt
          playwright install chromium

      - name: Run Scraper
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: |
          cd scraper
          if [ "${{ github.event.inputs.mode }}" = "refill" ]; then
            python main.py --refill --refill-limit ${{ github.event.inputs.refill_limit || '30' }}
          else
            python main.py
          fi
